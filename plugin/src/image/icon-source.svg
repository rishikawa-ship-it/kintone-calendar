<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 案A: カレンダーグリッド型 -->
  <!-- 背景 -->
  <rect width="128" height="128" rx="16" fill="#1a73e8"/>

  <!-- カレンダー本体（白い台形） -->
  <rect x="14" y="30" width="100" height="84" rx="6" fill="#ffffff"/>

  <!-- ヘッダー（濃い青） -->
  <rect x="14" y="30" width="100" height="26" rx="6" fill="#1557b0"/>
  <!-- ヘッダー下角を角丸なしにするため上書き -->
  <rect x="14" y="44" width="100" height="12" fill="#1557b0"/>

  <!-- リングピン 左 -->
  <rect x="36" y="22" width="8" height="18" rx="4" fill="#ffffff"/>
  <!-- リングピン 右 -->
  <rect x="84" y="22" width="8" height="18" rx="4" fill="#ffffff"/>

  <!-- ヘッダー内テキスト "KC" -->
  <text x="64" y="50" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">KC</text>

  <!-- グリッドセル（6列×4行） -->
  <!-- 行1 -->
  <rect x="20" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="36" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="52" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="68" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="84" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="100" y="64" width="12" height="10" rx="2" fill="#dbeafe"/>
  <!-- 行2 -->
  <rect x="20" y="78" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="36" y="78" width="12" height="10" rx="2" fill="#dbeafe"/>
  <!-- 強調セル（オレンジ: 自分の予定） -->
  <rect x="52" y="78" width="12" height="10" rx="2" fill="#ea580c"/>
  <rect x="68" y="78" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="84" y="78" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="100" y="78" width="12" height="10" rx="2" fill="#dbeafe"/>
  <!-- 行3 -->
  <rect x="20" y="92" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="36" y="92" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="52" y="92" width="12" height="10" rx="2" fill="#dbeafe"/>
  <!-- 強調セル（インジゴ: 終日予定） -->
  <rect x="68" y="92" width="28" height="10" rx="2" fill="#818cf8"/>
  <rect x="100" y="92" width="12" height="10" rx="2" fill="#dbeafe"/>
  <!-- 行4 -->
  <rect x="20" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="36" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="52" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="68" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="84" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
  <rect x="100" y="106" width="12" height="10" rx="2" fill="#dbeafe"/>
</svg>
